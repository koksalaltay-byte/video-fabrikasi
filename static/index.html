<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Video Fabrikası">
    <title>Video Fabrikası</title>
    <link rel="manifest" href="/manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        :root {
            --bg: #0a0a0a;
            --accent: #00ffcc;
            --text: #ffffff;
            --dim: #888888;
            --surface: #141414;
            --border: #2a2a2a;
        }
        html, body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            height: 100%;
            overflow: hidden;
        }
        input, button {
            font-family: inherit;
            -webkit-appearance: none;
        }
        input[type="text"], input[type="password"] {
            font-size: 16px; /* prevents iOS zoom */
        }

        /* --- SCREENS --- */
        .screen {
            display: none;
            flex-direction: column;
            height: 100vh;
            height: -webkit-fill-available;
            padding: env(safe-area-inset-top, 20px) env(safe-area-inset-right, 20px) env(safe-area-inset-bottom, 20px) env(safe-area-inset-left, 20px);
            padding-top: max(env(safe-area-inset-top), 20px);
            padding-bottom: max(env(safe-area-inset-bottom), 20px);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .screen.active { display: flex; }

        /* --- LOGIN --- */
        #login-screen {
            align-items: center;
            justify-content: center;
            gap: 14px;
            padding-left: 28px;
            padding-right: 28px;
        }
        .logo { font-size: 56px; line-height: 1; margin-bottom: 4px; }
        .app-title {
            font-size: 30px;
            font-weight: 900;
            color: var(--accent);
            letter-spacing: 3px;
        }
        .app-sub {
            font-size: 13px;
            color: var(--dim);
            margin-bottom: 20px;
        }
        .field {
            width: 100%;
            max-width: 340px;
            padding: 16px 18px;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            color: var(--text);
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        .field:focus { border-color: var(--accent); }
        .field::placeholder { color: #444; }
        .btn {
            width: 100%;
            max-width: 340px;
            padding: 17px;
            background: var(--accent);
            color: #0a0a0a;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 800;
            letter-spacing: 1px;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s;
        }
        .btn:active { transform: scale(0.97); opacity: 0.8; }
        .btn-ghost {
            background: transparent;
            border: 1.5px solid var(--border);
            color: var(--dim);
            font-weight: 600;
        }
        .err {
            color: #ff6b6b;
            font-size: 13px;
            text-align: center;
            max-width: 340px;
            min-height: 18px;
        }

        /* --- MAIN --- */
        #main-screen { gap: 22px; padding-left: 22px; padding-right: 22px; }
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 6px;
        }
        .topbar-title { font-size: 20px; font-weight: 900; color: var(--accent); }
        .btn-sm {
            background: none;
            border: none;
            color: var(--dim);
            font-size: 14px;
            cursor: pointer;
            padding: 8px;
        }
        .label {
            font-size: 11px;
            font-weight: 700;
            color: var(--dim);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 10px;
        }
        .topic-field {
            width: 100%;
            padding: 20px;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 16px;
            color: var(--accent);
            font-size: 22px;
            font-family: 'Courier New', monospace;
            font-weight: 700;
            text-align: center;
            outline: none;
        }
        .topic-field:focus { border-color: var(--accent); }
        .topic-field::placeholder { color: #333; font-size: 18px; }
        .lang-row { display: flex; gap: 12px; }
        .lang-btn {
            flex: 1;
            padding: 15px 8px;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            color: var(--dim);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .lang-btn.active {
            background: var(--accent);
            color: #0a0a0a;
            border-color: var(--accent);
        }
        .spacer { flex: 1; }
        .footer-note {
            font-size: 11px;
            color: #222;
            text-align: center;
            padding-bottom: 4px;
        }

        /* --- PROGRESS --- */
        #progress-screen {
            align-items: center;
            justify-content: center;
            gap: 24px;
            text-align: center;
            padding-left: 28px;
            padding-right: 28px;
        }
        .spinner {
            width: 52px;
            height: 52px;
            border: 4px solid #222;
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .prog-title { font-size: 22px; font-weight: 800; color: var(--accent); }
        .prog-big {
            font-size: 64px;
            font-weight: 900;
            line-height: 1;
            color: var(--text);
        }
        .prog-big span { font-size: 24px; color: var(--dim); }
        .prog-status { font-size: 15px; color: var(--dim); min-height: 22px; }
        .prog-bar-wrap {
            width: 100%;
            max-width: 300px;
            height: 6px;
            background: #1a1a1a;
            border-radius: 3px;
            overflow: hidden;
        }
        .prog-bar {
            height: 100%;
            background: var(--accent);
            border-radius: 3px;
            transition: width 0.5s ease;
            width: 0%;
        }
        .prog-note { font-size: 12px; color: #333; }

        /* --- RESULTS --- */
        #results-screen { gap: 14px; padding-left: 18px; padding-right: 18px; }
        .results-top { text-align: center; padding: 10px 0 6px; }
        .results-title { font-size: 26px; font-weight: 900; color: var(--accent); }
        .results-sub { font-size: 13px; color: var(--dim); margin-top: 4px; }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
        }
        .card-title {
            font-size: 13px;
            color: var(--text);
            font-weight: 600;
            margin-bottom: 12px;
            line-height: 1.4;
        }
        .dl-row { display: flex; gap: 8px; }
        .dl-btn {
            flex: 1;
            padding: 12px 6px;
            border-radius: 10px;
            border: 1.5px solid var(--accent);
            background: transparent;
            color: var(--accent);
            font-size: 12px;
            font-weight: 700;
            text-align: center;
            text-decoration: none;
            display: block;
            cursor: pointer;
            transition: all 0.15s;
        }
        .dl-btn:active { background: var(--accent); color: #0a0a0a; }

        /* --- MODAL --- */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.88);
            z-index: 99;
            align-items: flex-end;
            justify-content: center;
            padding: 0 0 env(safe-area-inset-bottom, 0);
        }
        .overlay.active { display: flex; }
        .modal {
            background: #111;
            border: 1px solid #2a2a2a;
            border-radius: 24px 24px 0 0;
            padding: 30px 24px calc(24px + env(safe-area-inset-bottom, 0));
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .modal-title {
            font-size: 20px;
            font-weight: 900;
            color: var(--accent);
            text-align: center;
            margin-bottom: 6px;
        }
        .modal .field { max-width: 100%; }
        .modal .btn { max-width: 100%; }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="screen active">
    <div class="logo">🎬</div>
    <div class="app-title">VİDEO FABRİKASI</div>
    <div class="app-sub">AI Destekli Shorts Üretici</div>
    <input type="text" id="l-user" class="field" placeholder="Kullanıcı Adı" autocomplete="username" autocapitalize="none">
    <input type="password" id="l-pass" class="field" placeholder="Şifre" autocomplete="current-password">
    <div id="l-err" class="err"></div>
    <button class="btn" onclick="doLogin()">GİRİŞ YAP</button>
    <button class="btn btn-ghost" onclick="showRegModal()">➕ Yeni Hesap Oluştur</button>
</div>

<!-- MAIN -->
<div id="main-screen" class="screen">
    <div class="topbar">
        <div class="topbar-title">🎬 VİDEO FABRİKASI</div>
        <button class="btn-sm" onclick="doLogout()">Çıkış ↩</button>
    </div>
    <div>
        <div class="label">📝 Konu</div>
        <input type="text" id="topic" class="topic-field" placeholder="örn: uzay, tarih, spor..." autocomplete="off" autocapitalize="sentences">
    </div>
    <div>
        <div class="label">🌐 Dil</div>
        <div class="lang-row">
            <button class="lang-btn active" id="btn-tr" onclick="setLang('tr')">🇹🇷 Türkçe</button>
            <button class="lang-btn" id="btn-en" onclick="setLang('en')">🇬🇧 English</button>
        </div>
    </div>
    <div class="spacer"></div>
    <button class="btn" onclick="startGen()">🚀 ÜRETİMİ BAŞLAT</button>
    <div class="footer-note">1080x1920 • 30fps • Max 58sn • YouTube SEO</div>
</div>

<!-- PROGRESS -->
<div id="progress-screen" class="screen">
    <div class="spinner"></div>
    <div class="prog-title">Üretim Devam Ediyor</div>
    <div class="prog-big"><span id="p-done">0</span><span> / 7</span></div>
    <div class="prog-bar-wrap"><div class="prog-bar" id="p-bar"></div></div>
    <div id="p-status" class="prog-status">Başlatılıyor...</div>
    <div class="prog-note">Sayfayı kapatmayın</div>
</div>

<!-- RESULTS -->
<div id="results-screen" class="screen">
    <div class="results-top">
        <div class="results-title">✅ Tamamlandı!</div>
        <div class="results-sub" id="r-count"></div>
    </div>
    <div id="r-list"></div>
    <button class="btn" style="margin-top:8px" onclick="goMain()">🔄 Yeni Üretim</button>
    <div class="footer-note" style="margin-top:4px">Videolar sunucu yeniden başlayana kadar indirilabilir</div>
</div>

<!-- REGISTER MODAL -->
<div class="overlay" id="reg-overlay">
    <div class="modal">
        <div class="modal-title">YENİ HESAP</div>
        <input type="text" id="r-user" class="field" placeholder="Kullanıcı Adı" autocapitalize="none">
        <input type="password" id="r-pass" class="field" placeholder="Şifre">
        <div id="r-err" class="err"></div>
        <button class="btn" onclick="doRegister()">KAYDET</button>
        <button class="btn btn-ghost" onclick="hideRegModal()">İptal</button>
    </div>
</div>

<script>
    let token = localStorage.getItem('vf_token');
    let jobId = null;
    let pollTimer = null;
    let lang = 'tr';

    if (token) show('main-screen');

    function show(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function goMain() { show('main-screen'); }

    function setLang(l) {
        lang = l;
        document.getElementById('btn-tr').classList.toggle('active', l === 'tr');
        document.getElementById('btn-en').classList.toggle('active', l === 'en');
    }

    async function doLogin() {
        const u = document.getElementById('l-user').value.trim();
        const p = document.getElementById('l-pass').value;
        const err = document.getElementById('l-err');
        if (!u || !p) { err.textContent = 'Tüm alanları doldurun!'; return; }
        err.textContent = '';
        try {
            const r = await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: u, password: p})
            });
            if (r.ok) {
                const d = await r.json();
                token = d.token;
                localStorage.setItem('vf_token', token);
                show('main-screen');
            } else {
                const e = await r.json();
                err.textContent = e.detail || 'Giriş başarısız!';
            }
        } catch { err.textContent = 'Bağlantı hatası!'; }
    }

    function doLogout() {
        token = null;
        localStorage.removeItem('vf_token');
        show('login-screen');
    }

    function showRegModal() {
        document.getElementById('reg-overlay').classList.add('active');
    }
    function hideRegModal() {
        document.getElementById('reg-overlay').classList.remove('active');
        document.getElementById('r-err').textContent = '';
    }

    async function doRegister() {
        const u = document.getElementById('r-user').value.trim();
        const p = document.getElementById('r-pass').value;
        const err = document.getElementById('r-err');
        if (!u || !p) { err.textContent = 'Tüm alanları doldurun!'; return; }
        try {
            const r = await fetch('/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: u, password: p})
            });
            if (r.ok) {
                alert('Kayıt tamamlandı! Giriş yapabilirsiniz.');
                hideRegModal();
            } else {
                const e = await r.json();
                err.textContent = e.detail || 'Kayıt başarısız!';
            }
        } catch { err.textContent = 'Bağlantı hatası!'; }
    }

    async function startGen() {
        const topic = document.getElementById('topic').value.trim();
        if (!topic) { alert('Lütfen bir konu girin!'); return; }
        try {
            const r = await fetch('/generate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({token, konu: topic, dil: lang})
            });
            if (r.status === 401) { doLogout(); return; }
            if (r.ok) {
                const d = await r.json();
                jobId = d.job_id;
                show('progress-screen');
                startPoll();
            } else {
                const e = await r.json();
                alert(e.detail || 'Hata oluştu!');
            }
        } catch { alert('Bağlantı hatası!'); }
    }

    function startPoll() {
        if (pollTimer) clearInterval(pollTimer);
        pollJob();
        pollTimer = setInterval(pollJob, 3000);
    }

    async function pollJob() {
        if (!jobId) return;
        try {
            const r = await fetch('/status/' + jobId);
            if (!r.ok) return;
            const j = await r.json();
            document.getElementById('p-done').textContent = j.completed;
            document.getElementById('p-status').textContent = j.progress;
            document.getElementById('p-bar').style.width = ((j.completed / 7) * 100) + '%';
            if (j.status === 'completed') {
                clearInterval(pollTimer);
                showResults(j.files);
            } else if (j.status === 'error') {
                clearInterval(pollTimer);
                alert('Hata: ' + j.error);
                show('main-screen');
            }
        } catch { /* polling error, retry next tick */ }
    }

    function showResults(files) {
        document.getElementById('r-count').textContent = files.length + ' video hazırlandı';
        const list = document.getElementById('r-list');
        list.innerHTML = '';
        files.forEach((f, i) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.style.marginBottom = '10px';
            card.innerHTML = `
                <div class="card-title">🎬 ${i+1}. ${f.baslik}</div>
                <div class="dl-row">
                    <a href="/download/${encodeURIComponent(f.video)}" download class="dl-btn">⬇ Video .mp4</a>
                    ${f.txt ? `<a href="/download/${encodeURIComponent(f.txt)}" download class="dl-btn">📄 Etiketler .txt</a>` : ''}
                </div>`;
            list.appendChild(card);
        });
        show('results-screen');
    }

    // Enter key triggers login
    document.getElementById('l-pass').addEventListener('keypress', e => { if (e.key === 'Enter') doLogin(); });
    document.getElementById('l-user').addEventListener('keypress', e => { if (e.key === 'Enter') document.getElementById('l-pass').focus(); });

    // Register service worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
</script>
</body>
</html>
